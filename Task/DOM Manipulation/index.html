<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>My Task List</h1>

    <!-- Input box to type a task -->
    <input type="text" id="taskInput" placeholder="Type a task here..." />

    <!-- No onclick here! We connect buttons to JS using addEventListener -->
    <button id="appendBtn">Add at Bottom</button>
    <button id="prependBtn">Add at Top</button>

    <!-- Tasks will appear here -->
    <ul id="myList"></ul>

    <script src="script.js"></script>
  </body>
</html>
